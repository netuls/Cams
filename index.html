<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Cams Exercícios">
    <meta name="theme-color" content="#d63f7e">
    
    <!-- Manifesto para PWA -->
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    
    <title>Cams Exercícios</title>
    
    <!-- Fontes -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- CSS Externo -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- SPLASH SCREEN (Tela de Carregamento) -->
    <div class="splash" id="splash">
        <div class="splash-bg">
            <div class="splash-wave"></div>
            <div class="splash-wave"></div>
            <div class="splash-wave"></div>
        </div>
        <div class="splash-particles" id="splash-particles"></div>
        <div class="splash-center">
            <div class="splash-photo-wrap">
                <div class="splash-photo-pulse2"></div>
                <div class="splash-photo-pulse"></div> 
                <div class="premium-ring"></div>
                <img class="splash-photo" src="foto.jpg" alt="Cams" />
                <div class="splash-ring-inner"></div>
                <div class="splash-ring-outer"></div>
            </div>
            <div class="splash-name-wrap">
                <span class="splash-name" id="splash-name-letters">Camila Evelyn</span>
                <span class="splash-sub">Agenda de Exercícios</span>
            </div>
            <div class="splash-loader">
                <div class="splash-bar-wrap"><div class="splash-bar-fill"></div></div>
                <div class="splash-loading-text">Carregando</div>
            </div>
        </div>
    </div>

    <!-- APP PRINCIPAL -->
    <div class="app">
        <header>
            <div class="logo">
                <div class="logo-icon">🏋️</div>
                <div>Camila <span style="color:var(--pink)">Evelyn</span><span class="logo-sub">Agenda de Exercícios</span></div>
            </div>
            <div class="header-right">
                <div class="pulse-dot"></div>
                <div class="date-badge" id="current-date"></div>
                <button class="btn-report" onclick="openReport()">📊 Relatório</button>
            </div>
        </header>

        <div class="week-nav" id="week-nav"></div>  

        <!-- JANELA DE RELATÓRIO -->
        <div class="overlay" id="overlay" onclick="closeReport(event)">
            <div class="report-panel" id="report-panel">
                <div class="report-header">
                    <div class="report-title">
                        <small>Relatório de treinos</small>
                        Meu Progresso
                    </div>
                    <button class="btn-close" onclick="closeReportBtn()">✕</button>
                </div>
                <div class="summary-strip" id="summary-strip"></div>
                <div class="report-section">
                    <div class="heatmap-grid" id="heatmap-grid"></div>
                </div>
                <div class="report-section">
                    <div class="day-log-list" id="day-log-list"></div>
                </div>
            </div>
        </div>

        <!-- JANELA DE DUPLICAÇÃO (Faltava este bloco) -->
        <div class="overlay" id="dup-overlay" onclick="closeDupOverlay(event)">
            <div class="report-panel" id="dup-panel" style="max-width:500px">
                <div class="report-header">
                    <div class="report-title"><small>Copiar treino</small>Duplicar para...</div>
                    <button class="btn-close" onclick="closeDupBtn()">✕</button>
                </div>
                <div id="dup-source-info"></div>
                <div class="dup-days-grid" id="dup-days-grid"></div>
                <button class="btn-add" style="width:100%" onclick="executeDuplicate()">Confirmar Cópia</button>
            </div>
        </div>

        <!-- JANELA DE CELEBRAÇÃO (Faltava este bloco) -->
        <div class="celebration-overlay" id="celebration-overlay">
            <div class="celebration-box" id="celebration-box">
                <span class="celebration-emoji">🎉</span>
                <div class="celebration-title">Treino Confirmado!</div>
                <div class="celebration-sub">Você arrasou hoje! 💗</div>
                <div class="celebration-stats" id="cel-stats"></div>
                <button class="btn-close-cel" onclick="closeCelebration()">Fechar</button>
            </div>
        </div>

        <!-- CONTEÚDO DO DIA -->
        <div class="card">
            <div class="section-label">Exercícios do dia</div>
            <div class="day-name-big" id="active-day-name"></div>
            <div class="day-full-date" id="active-day-date"></div>
            
            <!-- Barras de Status -->
            <div id="creatine-bar"></div>
            <div id="checkin-bar"></div>

            <div class="presets-section">
                <div class="presets-label">Selecionar treino</div>
                <div class="presets-chips" id="presets-chips"></div>
            </div>

            <div class="add-form">
                <input type="text" id="ex-input" placeholder="Ou escreva manualmente..." maxlength="80" />
                <input type="time" id="ex-time" />
                <button class="btn-add" onclick="addExercise()">+ Adicionar</button>
            </div>

            <div class="ex-list" id="ex-list"></div>

            <!-- Botões de Ação (Duplicar e Confirmar) -->
            <div id="dup-bar"></div>
            <div id="confirm-bar"></div>
        </div>

        <!-- RODAPÉ (Estatísticas) -->
        <div class="bottom-row">
            <div class="card">
                <div class="section-label">Semana atual</div>
                <div class="overview-grid" id="overview-grid"></div>
            </div>
            <div class="card">
                <div class="section-label">Estatísticas</div>
                <div class="stats-grid" id="stats-grid"></div>
                <div id="progress-wrap"></div>
            </div>
        </div>
    </div>

    <!-- Scripts (Firebase e Lógica) -->
    <script type="module" src="firebase-config.js"></script>
    <script src="scripts.js"></script>
</body>
</html>
