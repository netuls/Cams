<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#d63f7e">
    <title>Cams Exercícios</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;700&family=Jost:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Splash Screen -->
    <div class="splash" id="splash">
        <div class="splash-bg">
            <div class="splash-wave"></div><div class="splash-wave"></div><div class="splash-wave"></div>
        </div>
        <div class="splash-center">
            <div class="splash-photo-wrap">
                <div class="premium-ring"></div>
                <!-- VERIFIQUE SE O NOME DA FOTO ESTÁ CORRETO ABAIXO -->
                <img class="splash-photo" src="sua-foto.jpg" alt="Cams">
            </div>
            <div class="splash-name-wrap">
                <span class="splash-name">Cams Exercícios</span>
                <span class="splash-sub">Seu treino, seu progresso</span>
            </div>
        </div>
    </div>

    <div class="app">
        <header>
            <div class="logo">
                <div class="logo-icon">🏋️</div>
                <div>Cams <span style="color:var(--pink)">Evelyn</span></div>
            </div>
            <div class="header-right">
                <div class="date-badge" id="current-date"></div>
                <button class="btn-report" onclick="window.openReport()">📊 Relatório</button>
            </div>
        </header>

        <div class="week-nav" id="week-nav"></div>

        <div class="card">
            <div class="day-name-big" id="active-day-name"></div>
            <div class="day-full-date" id="active-day-date"></div>
            <div id="creatine-bar"></div>
            <div id="checkin-bar"></div>

            <div class="add-form">
                <input type="text" id="ex-input" placeholder="Novo exercício...">
                <input type="time" id="ex-time">
                <button class="btn-add" onclick="window.addExercise()">+ Adicionar</button>
            </div>

            <div class="ex-list" id="ex-list"></div>
        </div>

        <div class="bottom-row">
            <div class="card"><div id="overview-grid" class="overview-grid"></div></div>
            <div class="card"><div id="stats-grid" class="stats-grid"></div><div id="progress-wrap"></div></div>
        </div>
    </div>

    <!-- Overlay de Relatório Simples -->
    <div class="overlay" id="overlay">
        <div class="report-panel">
            <button onclick="window.closeReport()">Fechar Relatório</button>
            <div id="report-content">Em breve mais detalhes...</div>
        </div>
    </div>

    <div class="firebase-status"><div class="fb-dot" id="fb-dot"></div><span id="fb-label">Firebase</span></div>

    <!-- CARREGAMENTO ÚNICO DO JAVASCRIPT -->
    <script type="module" src="scripts.js"></script>

    <!-- Script de Emergência: Remove a splash se o JS principal falhar -->
    <script>
        setTimeout(() => {
            const s = document.getElementById('splash');
            if (s && !s.classList.contains('hide')) {
                s.classList.add('hide');
                console.log("Remoção de emergência da splash executada.");
            }
        }, 5000);
    </script>
</body>
</html>
