<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#d63f7e">
    <link rel="apple-touch-icon" href="icon.png">
    <title>Cams Exercícios</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- CSS Externo -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Splash Screen -->
    <div class="splash" id="splash">
        <div class="splash-bg">
            <div class="splash-wave"></div>
            <div class="splash-wave"></div>
            <div class="splash-wave"></div>
        </div>
        <div class="splash-center">
            <div class="splash-photo-wrap">
                <div class="premium-ring"></div>
                <img class="splash-photo" src="sua-foto.jpg" alt="Cams">
            </div>
            <div class="splash-name-wrap">
                <span class="splash-name">Cams Exercícios</span>
                <span class="splash-sub">Agenda de Exercícios</span>
            </div>
            <div class="splash-loader">
                <div class="splash-bar-wrap"><div class="splash-bar-fill"></div></div>
                <div class="splash-loading-text">Sincronizando...</div>
            </div>
        </div>
    </div>

    <!-- Interface Principal -->
    <div class="app">
        <header>
            <div class="logo">
                <div class="logo-icon">🏋️</div>
                <div>Camila <span style="color:var(--pink)">Evelyn</span><span class="logo-sub">Agenda</span></div>
            </div>
            <div class="header-right">
                <div class="date-badge" id="current-date"></div>
                <button class="btn-report" onclick="openReport()">📊 Relatório</button>
            </div>
        </header>

        <div class="week-nav" id="week-nav"></div>

        <div class="card">
            <div class="day-name-big" id="active-day-name"></div>
            <div class="day-full-date" id="active-day-date"></div>
            <div id="creatine-bar"></div>
            <div id="checkin-bar"></div>

            <div class="presets-section">
                <div class="presets-chips" id="presets-chips"></div>
            </div>

            <div class="add-form">
                <input type="text" id="ex-input" placeholder="Novo exercício...">
                <input type="time" id="ex-time">
                <button class="btn-add" onclick="addExercise()">+ Adicionar</button>
            </div>

            <div class="ex-list" id="ex-list"></div>
            <div id="dup-bar"></div>
        </div>

        <!-- Estatísticas e Overview -->
        <div class="bottom-row">
            <div class="card"><div id="overview-grid" class="overview-grid"></div></div>
            <div class="card"><div id="stats-grid" class="stats-grid"></div><div id="progress-wrap"></div></div>
        </div>
    </div>

    <!-- Modais e Overlays Ocultos (Relatório, Duplicar, Celebração) -->
    <!-- ... (Mantenha as estruturas de <div class="overlay"> que estavam no seu HTML original aqui) ... -->

    <!-- Scripts -->
    <script type="module" src="firebase-config.js"></script>
    <script src="scripts.js"></script>
</body>
</html>
